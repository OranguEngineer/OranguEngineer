name: Update dev.to posts

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://dev.to/feed/oranguengineer"
          max_post_count: 5
          readme_path: README.md
          comment_tag_name: DEV-TO-POSTS
          gh_token: ${{ secrets.GITHUB_TOKEN }}